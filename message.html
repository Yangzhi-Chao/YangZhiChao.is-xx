<!DOCTYPE html>
<html>
<head>
    <style>
        
    </style>
    <meta charset="UTF8">
    <title>留言板</title><!--留言板大标题-->
</head>
<style>
    body {                  /* 整个网页的整体设置 */
    text-align: center; /* 页面里所有内容默认居中显示 */
    background: #f5f5f5;/* 页面背景色：浅灰色 */
    color: #333;        /* 整个页面默认文字颜色：深灰色 */
}
  /*改图片的颜色大小属性*/
  img {                     /* 所有图片的样式 */
    width: 200px;         /* 图片宽度固定200像素 */
    margin: 10px;         /* 图片四周留出10像素空白，不贴在一起 */
    cursor: pointer;      /* 鼠标放到图片上，变成小手形状 */
    border-radius: 20px;  /* 图片四个角变圆，圆角20像素 */
    box-shadow: 0 9px 8px rgba(0, 0, 225, 0.15);  /* 图片加蓝色阴影，更立体 */
}
  /* 新加的：鼠标放上去放大 */
img:hover {          /* 鼠标放到图片上时 */
  transform: scale(1.08); /* 图片放大 1.08 倍 */
  transition: 0.2s;       /* 放大动画 0.2 秒完成，变得顺滑不突兀 */
}
/*自插图片*/
  .tupian {
    width: 200px;
    margin: 10px;
    cursor: pointer;
    border-radius:0px;
   }
   /*大标题*/
   .header {            /* 页面头部 / 标题区域 */
  text-align: center;/* 文字居中 */
  padding: 20px;     /* 内部上下左右留白 20px */
  background: #fff;  /* 背景白色 */
  margin-bottom: 20px;/* 下方留出 20px 空白，和下面内容隔开 */
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);/* 底部淡淡的阴影，更立体好看 */
}
/*页底*/
.footer {            /* 网页底部（页脚） */
  text-align: center;/* 文字居中 */
  padding: 15px;     /* 内部四边留白 15px */
  margin-top: 30px;  /* 上方空出 30px，和上面内容隔开 */
  color: #666;       /* 文字颜色：灰色 */
  font-size: 14px;   /* 字体大小 14 像素（偏小一点） */
}
/*导航栏*/
.nav {                     /* 导航栏的整体样式 */
  text-align: center;      /* 文字居中显示 */
  margin: 20px 0;          /* 上下留出20px空白，左右不留 */
  background: #3462f8;     /* 背景颜色：蓝色 */
  padding: 12px;           /* 内部四边都留出12px空白（文字不贴边） */
  border-radius: 30px;     /* 圆角30px，让导航变成椭圆圆角 */
}
.nav a {                /* 导航栏里面的文字链接（首页、产品...） */
  margin: 0 12px;       /* 上下没有间距，左右各空出12px（让文字分开） */
  font-size: 16px;      /* 字体大小16像素 */
  color: #333;          /* 文字颜色：深灰色 */
  text-decoration: none;/* 去掉链接默认的下划线 */
}
.nav a:hover {         /* 鼠标放到导航文字上时 */
  color: red;          /* 文字颜色变成红色 */
  font-weight: bold;   /* 文字变成加粗 */
}
/*lyb*/
.message-form {                     /* 留言表单容器 */
  max-width: 500px;                 /* 最大宽度：500像素 */
  margin: 30px auto;                /* 外边距：上下30px，左右自动居中 */
  padding: 20px;                    /* 内边距：20像素 */
  background: #fff;                 /* 背景：白色 */
  border-radius: 15px;               /* 边框圆角：15像素 */
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);  /* 盒子阴影：轻微灰色阴影 */
}

</style>
<body>
    <div class="header">
  <h1>留言板</h1><!--留言板大标题-->
</div>
  <!--导航栏-->
  <div class="nav">
  <a href="index.html">首页</a><!--(首页、产品...)就是导航栏里面的文字链接-->
  <a href="product.html">产品</a>
  <a href="contact.html">联系我们</a>
  <a href="message.html">留言板</a>
</div>
<div class="message-form">
  <h3>给我留言</h3>
  <input type="text" id="msgName" placeholder="您的姓名" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px;">
  <input type="text" id="msgPhone" placeholder="您的电话（选填）" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px;">
  <textarea id="msgContent" placeholder="留言内容" style="width:100%; padding:10px; margin:10px 0; height:120px; border:1px solid #ddd; border-radius:5px;"></textarea>
  <button onclick="submitMsg()" style="background:red; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; font-size:16px;">提交留言</button>
</div>

<!-- 留言列表展示 -->
<div id="msgList" style="max-width:600px; margin:30px auto; text-align:left;"></div>

<img src="1.jpeg" class="tupian" onclick="openImage(this.src)">
    <img src="3.jpeg" onclick="openImage(this.src)">
    <img src="5.jpeg" onclick="openImage(this.src)">
    <img src="6.jpeg" onclick="openImage(this.src)">
    <img src="7.jpeg" onclick="openImage(this.src)">
    <img src="9.jpg" onclick="openImage(this.src)">
    <img src="10.jpg" class="tupian" onclick="openImage(this.src)">

    <script>
// 点击图片放大查看
function openImage(src) {
  let lightbox = document.createElement("div");
  lightbox.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:9999;display:flex;justify-content:center;align-items:center;";
  lightbox.onclick = function(){ lightbox.remove() };

  let img = document.createElement("img");
  img.src = src;
  img.style.cssText = "width:auto;height:100vh;object-fit:contain;";

  lightbox.appendChild(img);
  document.body.appendChild(lightbox);
}

// 提交留言
function submitMsg() {
  let name = document.getElementById("msgName").value.trim();
  let content = document.getElementById("msgContent").value.trim();
  if(!name || !content) {
    alert("请填写姓名和留言内容！");
    return;
  }

  let msg = {
    name: name,
    phone: document.getElementById("msgPhone").value.trim(),
    content: content,
    time: new Date().toLocaleString()
  };

  let msgs = JSON.parse(localStorage.getItem("messages")) || [];
  msgs.push(msg);
  localStorage.setItem("messages", JSON.stringify(msgs));
  
  alert("留言成功！感谢您的反馈~");
  // 清空输入框
  document.getElementById("msgName").value = "";
  document.getElementById("msgPhone").value = "";
  document.getElementById("msgContent").value = "";
  
  // 刷新留言列表
  loadMsgs();
}

// 加载留言列表
function loadMsgs() {
  let msgs = JSON.parse(localStorage.getItem("messages")) || [];
  let list = document.getElementById("msgList");
  list.innerHTML = "";
  
  if(msgs.length === 0) {
    list.innerHTML = "<p style='text-align:center; color:#666;'>暂无留言</p>";
    return;
  }

  msgs.forEach(msg => {
    list.innerHTML += `
      <div style="background:white; padding:15px; margin:10px 0; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
        <p style="font-weight:bold; margin:0 0 5px 0;">${msg.name}</p>
        <p style="color:#666; font-size:14px; margin:0 0 10px 0;">${msg.time}</p>
        <p style="margin:0;">${msg.content}</p>
        ${msg.phone ? `<p style="color:#666; font-size:14px; margin:5px 0 0 0;">联系电话：${msg.phone}</p>` : ""}
      </div>
    `;
  });
}

// 页面加载时自动加载留言
window.onload = loadMsgs;
</script>
<div class="footer">
  © 2026 我的产品展示 - 保留所有权利
</div>
</body>
</html>
